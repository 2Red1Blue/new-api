<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云溪 AI - 动态背景预览</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(118% 78% at 52% 92%, #405178 0%, rgba(64, 81, 120, 0) 48%),
          radial-gradient(70% 54% at 18% 18%, rgba(124, 156, 221, 0.25) 0%, rgba(124, 156, 221, 0) 62%),
          radial-gradient(76% 60% at 84% 12%, rgba(255, 230, 186, 0.13) 0%, rgba(255, 230, 186, 0) 60%),
          linear-gradient(180deg, #090b18 0%, #111a35 48%, #070a13 100%);
        background-color: #070a13;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .controls {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 2;
        display: flex;
        gap: 8px;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .controls button {
        border: 1px solid rgba(226, 234, 255, 0.22);
        border-radius: 999px;
        background: rgba(5, 8, 18, 0.38);
        color: rgba(235, 241, 255, 0.8);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.08em;
        padding: 8px 12px;
        backdrop-filter: blur(16px);
      }

      .controls button[aria-pressed="true"] {
        border-color: rgba(231, 237, 255, 0.54);
        color: #fff;
        box-shadow: 0 0 28px rgba(152, 177, 255, 0.18);
      }

      .is-embed .controls {
        display: none;
      }

      @media (max-width: 640px) {
        .controls {
          right: 12px;
          bottom: 12px;
        }

        .controls button {
          padding: 7px 10px;
        }
      }
    </style>
  </head>
      <body>
    <canvas id="canvas"></canvas>
    <div class="controls" aria-label="背景预览控制">
      <button type="button" id="toggle-mode" aria-pressed="false">显示文字</button>
      <button type="button" id="toggle-motion" aria-pressed="false">暂停</button>
    </div>

    <script>
      const canvas = document.getElementById('canvas')
      const ctx = canvas.getContext('2d')
      const modeButton = document.getElementById('toggle-mode')
      const motionButton = document.getElementById('toggle-motion')
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)')
      const params = new URLSearchParams(window.location.search)
      const isEmbed = params.get('embed') === '1'

      let cw = 1
      let ch = 1
      let dpr = 1
      let time = 0
      let showText = false
      let paused = reduceMotion.matches
      let mouseX = 0.5
      let mouseY = 0.45

      if (isEmbed) {
        document.body.classList.add('is-embed')
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2)
        cw = window.innerWidth
        ch = window.innerHeight
        canvas.width = Math.floor(cw * dpr)
        canvas.height = Math.floor(ch * dpr)
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
      }

      window.addEventListener('resize', resize)
      window.addEventListener('pointermove', (event) => {
        mouseX = event.clientX / cw
        mouseY = event.clientY / ch
      })
      resize()

      if (!isEmbed) {
        modeButton.addEventListener('click', () => {
          showText = !showText
          modeButton.setAttribute('aria-pressed', String(showText))
          modeButton.textContent = showText ? '隐藏文字' : '显示文字'
        })

        motionButton.addEventListener('click', () => {
          paused = !paused
          motionButton.setAttribute('aria-pressed', String(paused))
          motionButton.textContent = paused ? '继续' : '暂停'
        })

        if (paused) {
          motionButton.setAttribute('aria-pressed', 'true')
          motionButton.textContent = '继续'
        }
      }

      class CloudOrb {
        constructor() {
          this.reset(true)
        }

        reset(initial = false) {
          this.x = Math.random() * cw
          this.y = initial ? Math.random() * ch : ch + Math.random() * ch * 0.5
          this.radius = Math.random() * 340 + 240
          this.vx = Math.random() * 0.28 - 0.14
          this.vy = Math.random() * -0.22 - 0.08
          const colors = [
            'rgba(136, 166, 236, 0.055)',
            'rgba(255, 248, 232, 0.038)',
            'rgba(203, 220, 255, 0.046)',
            'rgba(121, 150, 218, 0.034)',
          ]
          this.color = colors[Math.floor(Math.random() * colors.length)]
        }

        update() {
          this.x += this.vx
          this.y += this.vy
          if (this.y < -this.radius || this.x < -this.radius || this.x > cw + this.radius) {
            this.reset()
          }
        }

        draw() {
          const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius)
          grad.addColorStop(0, this.color)
          grad.addColorStop(1, 'rgba(255,255,255,0)')
          ctx.fillStyle = grad
          ctx.beginPath()
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2)
          ctx.fill()
        }
      }

      class StarDust {
        constructor() {
          this.reset()
        }

        reset() {
          this.x = Math.random() * cw
          this.y = Math.random() * ch
          this.size = Math.random() * 1.6 + 0.35
          this.maxAlpha = Math.random() * 0.65 + 0.18
          this.alpha = Math.random() * this.maxAlpha
          this.fadeSpeed = Math.random() * 0.008 + 0.003
        }

        update() {
          this.alpha += this.fadeSpeed
          if (this.alpha > this.maxAlpha || this.alpha < 0) {
            this.fadeSpeed = -this.fadeSpeed
            if (this.alpha < 0) this.reset()
          }
        }

        draw() {
          const twinkle = 0.65 + Math.sin(time * 3 + this.x * 0.02) * 0.35
          ctx.fillStyle = `rgba(238, 242, 255, ${Math.max(0, this.alpha * twinkle)})`
          ctx.beginPath()
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
          ctx.fill()
        }
      }

      class LightRain {
        constructor() {
          this.reset(true)
        }

        reset(initial = false) {
          this.x = Math.random() * (cw + 120)
          this.y = initial ? Math.random() * ch : Math.random() * -220 - 50
          this.length = Math.random() * 70 + 28
          this.speedY = Math.random() * 1.45 + 0.45
          this.speedX = -this.speedY * 0.18
          this.opacity = Math.random() * 0.22 + 0.04
        }

        update() {
          this.x += this.speedX
          this.y += this.speedY
          if (this.y - this.length > ch || this.x < -this.length) this.reset()
        }

        draw() {
          const tailX = this.x - this.speedX * (this.length / this.speedY)
          const tailY = this.y - this.speedY * (this.length / this.speedY)
          const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY)
          grad.addColorStop(0, `rgba(230, 238, 255, ${this.opacity})`)
          grad.addColorStop(1, 'rgba(255, 255, 255, 0)')
          ctx.strokeStyle = grad
          ctx.lineWidth = 1.1
          ctx.beginPath()
          ctx.moveTo(this.x, this.y)
          ctx.lineTo(tailX, tailY)
          ctx.stroke()
        }
      }

      class Comet {
        constructor() {
          this.reset()
        }

        reset() {
          const speed = Math.random() * 6 + 3
          const angle = Math.PI * (0.21 + Math.random() * 0.08)
          this.x = Math.random() * cw * 1.4 - cw * 0.24
          this.y = Math.random() * ch * -0.55 - 80
          this.vx = Math.cos(angle) * speed
          this.vy = Math.sin(angle) * speed
          this.length = Math.random() * 210 + 130
          this.opacity = Math.random() * 0.52 + 0.34
          this.width = Math.random() * 1.4 + 0.9
          this.delay = Math.random() * 360 + 80
          this.active = false
        }

        update() {
          if (this.delay > 0) {
            this.delay -= 1
            return
          }
          this.active = true
          this.x += this.vx
          this.y += this.vy
          if (this.y > ch + this.length || this.x > cw + this.length) this.reset()
        }

        draw() {
          if (!this.active) return

          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`
          ctx.beginPath()
          ctx.arc(this.x, this.y, this.width, 0, Math.PI * 2)
          ctx.fill()

          ctx.fillStyle = `rgba(187, 204, 255, ${this.opacity * 0.42})`
          ctx.beginPath()
          ctx.arc(this.x, this.y, this.width * 4.2, 0, Math.PI * 2)
          ctx.fill()

          const tailLen = this.length / Math.hypot(this.vx, this.vy)
          const tailX = this.x - this.vx * tailLen
          const tailY = this.y - this.vy * tailLen
          const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY)
          grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`)
          grad.addColorStop(0.12, `rgba(190, 209, 255, ${this.opacity * 0.72})`)
          grad.addColorStop(0.48, `rgba(123, 150, 222, ${this.opacity * 0.2})`)
          grad.addColorStop(1, 'rgba(255, 255, 255, 0)')
          ctx.strokeStyle = grad
          ctx.lineWidth = this.width * 1.35
          ctx.beginPath()
          ctx.moveTo(this.x, this.y)
          ctx.lineTo(tailX, tailY)
          ctx.stroke()
        }
      }

      class Firefly {
        constructor() {
          this.reset()
        }

        reset() {
          this.x = Math.random() * cw
          this.y = ch * (0.58 + Math.random() * 0.34)
          this.size = Math.random() * 2.4 + 0.9
          this.speed = Math.random() * 0.35 + 0.08
          this.phase = Math.random() * Math.PI * 2
          this.opacity = Math.random() * 0.38 + 0.16
        }

        update() {
          this.phase += 0.014
          this.x += Math.cos(this.phase) * this.speed
          this.y += Math.sin(this.phase * 0.8) * this.speed * 0.5 - 0.08
          if (this.y < ch * 0.42 || this.x < -20 || this.x > cw + 20) this.reset()
        }

        draw() {
          const alpha = this.opacity * (0.55 + Math.sin(this.phase * 2.4) * 0.45)
          const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 9)
          grad.addColorStop(0, `rgba(255, 242, 205, ${alpha})`)
          grad.addColorStop(0.2, `rgba(192, 205, 255, ${alpha * 0.3})`)
          grad.addColorStop(1, 'rgba(192, 205, 255, 0)')
          ctx.fillStyle = grad
          ctx.beginPath()
          ctx.arc(this.x, this.y, this.size * 9, 0, Math.PI * 2)
          ctx.fill()
        }
      }

      function drawBase() {
        ctx.clearRect(0, 0, cw, ch)
        const bg = ctx.createRadialGradient(cw * 0.5, ch, 0, cw * 0.5, ch, Math.max(cw, ch) * 1.15)
        bg.addColorStop(0, '#364a77')
        bg.addColorStop(0.34, '#111a35')
        bg.addColorStop(1, '#060914')
        ctx.fillStyle = bg
        ctx.fillRect(0, 0, cw, ch)

        const skyGlow = ctx.createRadialGradient(cw * mouseX, ch * mouseY, 0, cw * mouseX, ch * mouseY, Math.max(cw, ch) * 0.5)
        skyGlow.addColorStop(0, 'rgba(219, 226, 255, 0.16)')
        skyGlow.addColorStop(0.46, 'rgba(119, 148, 223, 0.052)')
        skyGlow.addColorStop(1, 'rgba(6, 9, 20, 0)')
        ctx.fillStyle = skyGlow
        ctx.fillRect(0, 0, cw, ch)
      }

      function drawStreamRibbon() {
        ctx.globalCompositeOperation = 'screen'
        const layers = [
          { color: '155, 180, 255', amp: 62, freq: 0.0017, speed: 0.42, offset: 0.66, alpha: 0.052 },
          { color: '221, 230, 255', amp: 96, freq: 0.0011, speed: 0.32, offset: 0.78, alpha: 0.05 },
          { color: '255, 242, 211', amp: 48, freq: 0.0024, speed: 0.26, offset: 0.88, alpha: 0.038 },
          { color: '126, 150, 226', amp: 118, freq: 0.0009, speed: 0.22, offset: 0.94, alpha: 0.036 },
        ]

        layers.forEach((layer) => {
          ctx.beginPath()
          ctx.moveTo(0, ch)
          for (let x = 0; x <= cw + 30; x += 24) {
            const y =
              ch * layer.offset +
              Math.sin(x * layer.freq + time * layer.speed) * layer.amp +
              Math.cos(x * layer.freq * 0.7 - time * layer.speed * 0.8) * (layer.amp * 0.38)
            ctx.lineTo(x, y)
          }
          ctx.lineTo(cw, ch)
          ctx.closePath()

          const fill = ctx.createLinearGradient(0, ch * 0.45, 0, ch)
          fill.addColorStop(0, `rgba(${layer.color}, 0)`)
          fill.addColorStop(0.48, `rgba(${layer.color}, ${layer.alpha})`)
          fill.addColorStop(1, 'rgba(255, 255, 255, 0)')
          ctx.fillStyle = fill
          ctx.fill()

          ctx.beginPath()
          for (let x = 0; x <= cw + 30; x += 24) {
            const y =
              ch * layer.offset +
              Math.sin(x * layer.freq + time * layer.speed) * layer.amp +
              Math.cos(x * layer.freq * 0.7 - time * layer.speed * 0.8) * (layer.amp * 0.38)
            if (x === 0) ctx.moveTo(x, y)
            else ctx.lineTo(x, y)
          }
          ctx.strokeStyle = `rgba(${layer.color}, 0.16)`
          ctx.lineWidth = 1.25
          ctx.stroke()
        })

        ctx.globalCompositeOperation = 'source-over'
      }

      function drawCaustics() {
        ctx.globalCompositeOperation = 'screen'
        for (let i = 0; i < 9; i += 1) {
          const y = ch * (0.62 + i * 0.038) + Math.sin(time * 0.7 + i) * 16
          const gradient = ctx.createLinearGradient(0, y, cw, y + 60)
          gradient.addColorStop(0, 'rgba(255,255,255,0)')
          gradient.addColorStop(0.5, `rgba(225, 232, 255, ${0.024 + i * 0.002})`)
          gradient.addColorStop(1, 'rgba(255,255,255,0)')
          ctx.strokeStyle = gradient
          ctx.lineWidth = 1
          ctx.beginPath()
          for (let x = 0; x <= cw; x += 36) {
            const waveY = y + Math.sin(x * 0.012 + time * 0.8 + i) * 12
            if (x === 0) ctx.moveTo(x, waveY)
            else ctx.lineTo(x, waveY)
          }
          ctx.stroke()
        }
        ctx.globalCompositeOperation = 'source-over'
      }

      function drawPreviewText() {
        if (!showText) return

        ctx.save()
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)'
        ctx.shadowBlur = 34
        ctx.fillStyle = 'rgba(249, 250, 255, 0.94)'
        ctx.font = `700 ${Math.min(172, Math.max(72, cw * 0.12))}px "Noto Serif SC", "Songti SC", serif`
        ctx.fillText('云溪 AI', cw * 0.5, ch * 0.48)
        ctx.shadowBlur = 18
        ctx.fillStyle = 'rgba(232, 237, 255, 0.72)'
        ctx.font = '300 17px ui-sans-serif, system-ui, sans-serif'
        ctx.fillText('ai.laiber.cloud', cw * 0.5, ch * 0.62)
        ctx.restore()
      }

      function drawVignette() {
        const vignette = ctx.createRadialGradient(cw * 0.5, ch * 0.48, Math.min(cw, ch) * 0.2, cw * 0.5, ch * 0.48, Math.max(cw, ch) * 0.72)
        vignette.addColorStop(0, 'rgba(0, 0, 0, 0)')
        vignette.addColorStop(1, 'rgba(0, 0, 0, 0.3)')
        ctx.fillStyle = vignette
        ctx.fillRect(0, 0, cw, ch)
      }

      const orbs = Array.from({ length: 8 }, () => new CloudOrb())
      const stars = Array.from({ length: 180 }, () => new StarDust())
      const rain = Array.from({ length: 42 }, () => new LightRain())
      const comets = Array.from({ length: 6 }, () => new Comet())
      const fireflies = Array.from({ length: 26 }, () => new Firefly())

      function animate() {
        if (!paused) time += 0.01

        drawBase()

        orbs.forEach((orb) => {
          if (!paused) orb.update()
          orb.draw()
        })

        stars.forEach((star) => {
          if (!paused) star.update()
          star.draw()
        })

        drawStreamRibbon()
        drawCaustics()

        fireflies.forEach((firefly) => {
          if (!paused) firefly.update()
          firefly.draw()
        })

        rain.forEach((drop) => {
          if (!paused) drop.update()
          drop.draw()
        })

        comets.forEach((comet) => {
          if (!paused) comet.update()
          comet.draw()
        })

        drawPreviewText()
        drawVignette()
        requestAnimationFrame(animate)
      }

      animate()
    </script>
  </body>
</html>
